<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thyroid Prediction</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: #f7f7f7; }
        header { background: #003366; color: #fff; padding: 16px; }
        nav a { color: #fff; margin-right: 16px; text-decoration: none; }
        .container { max-width: 980px; margin: 24px auto; padding: 0 16px; }
        .card { background: #fff; border-radius: 8px; padding: 20px; box-shadow: 0 1px 10px rgba(0,0,0,0.08); margin-bottom: 20px; }
        .messages { margin-bottom: 16px; }
        .messages div { padding: 10px; border-radius: 4px; margin-bottom: 6px; }
        .success { background: #daf5d4; color: #1d6b2f; }
        .error { background: #f7d4d4; color: #8a1c1c; }
        input, button, select, textarea { width: 100%; padding: 10px; margin-top: 8px; margin-bottom: 16px; border: 1px solid #ccc; border-radius: 4px; }
        button { background: #003366; color: #fff; border: none; cursor: pointer; }
        button:hover { opacity: 0.95; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; border: 1px solid #ddd; }
    </style>
</head>
<body>
<header>
    <nav>
        <a href="{%% url 'home' %%}">Home</a>
        {%% if request.user.is_authenticated %%}
            <a href="{%% url 'dashboard' %%}">Dashboard</a>
            <a href="{%% url 'upload_dataset' %%}">Upload Dataset</a>
            <a href="{%% url 'classification' %%}">Classification</a>
            <a href="{%% url 'prediction' %%}">Prediction</a>
            <a href="{%% url 'logout' %%}">Logout</a>
        {%% else %%}
            <a href="{%% url 'register' %%}">Register</a>
            <a href="{%% url 'login' %%}">Login</a>
        {%% endif %%}
        <a href="{%% url 'admin_dashboard' %%}">Admin Panel</a>
    </nav>
</header>
<div class="container">
    <div class="messages">
        {%% for message in messages %%}
            <div class="{%% if message.tags %%}{{ message.tags }}{%% endif %%}">{{ message }}</div>
        {%% endfor %%}
    </div>
    {%% block content %%}{%% endblock %%}
</div>
</body>
</html>
