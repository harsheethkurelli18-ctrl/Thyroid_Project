{% extends 'core/base.html' %}

{% block content %}
<div class="card">
    <h2>Prediction</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Predict</button>
    </form>
    {% if prediction is not None %}
        <div class="card">
            <h3>Prediction Result</h3>
            <p>Model output: <strong>{{ prediction }}</strong></p>
            <p>Interpreted label: <strong>{{ label }}</strong></p>
        </div>
    {% endif %}
</div>
{% endblock %}
